<nav class="sticky top-0 z-50 border-b border-[#262D38] bg-[#0F1319]/92 backdrop-blur-md">
  <div class="mx-auto max-w-[1280px] px-6">
    <div class="flex h-16 items-center justify-between gap-6">

      <a routerLink="/" class="flex items-center gap-2.5">
        <span class="relative flex h-[30px] w-[30px] items-center justify-center overflow-hidden rounded-[7px] border border-[#262D38] bg-gradient-to-br from-[#1E2530] to-[#12151C] after:absolute after:h-3.5 after:w-3.5 after:rotate-45 after:rounded-[3px] after:bg-[#FFB454] after:opacity-90"></span>
        <span class="font-['Space_Grotesk'] text-base font-semibold tracking-tight text-[#ECEAE3]">{{ logoText }}</span>
      </a>

      <div #primaryNav (mouseleave)="resetPill()" class="relative hidden items-center gap-0.5 rounded-[11px] border border-[#262D38] bg-[#171C24] p-1 md:flex" id="primary">
        
        <div #slidingPill class="absolute bottom-1 left-1 top-1 w-0 rounded-[8px] border border-[#333B48] bg-[#20262F] transition-all duration-350 cubic-bezier(0.65, 0, 0.35, 1) z-0"></div>

        <a #homeRef
           routerLink="/home" 
           routerLinkActive="active" 
           [routerLinkActiveOptions]="{exact: true}" 
           (mouseenter)="movePill(homeRef)" 
           class="nav-item group relative z-10 flex cursor-pointer items-center gap-1.75 rounded-[8px] bg-none px-3.5 py-2 text-[13.5px] font-medium text-[#8A92A3] transition-colors duration-200 hover:text-[#ECEAE3] [&.active]:text-[#ECEAE3]">
          <svg class="h-[15px] w-[15px] opacity-75 group-hover:opacity-100 group-[.active]:opacity-100 group-[.active]:stroke-[#FFB454]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9.5 12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1V9.5Z"/></svg>
          Home
        </a>

        <div class="relative z-10">
          <button #authRef
                  (click)="toggleAuthDropdown($event)" 
                  (mouseenter)="movePill(authRef)" 
                  [attr.aria-expanded]="isAuthOpen" 
                  class="nav-item group flex cursor-pointer items-center gap-1.75 rounded-[8px] bg-none px-3.5 py-2 text-[13.5px] font-medium text-[#8A92A3] transition-colors duration-200 hover:text-[#ECEAE3] [&.active]:text-[#ECEAE3]" id="authTrigger">
            <svg class="h-[15px] w-[15px] opacity-75 group-hover:opacity-100" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="10" width="16" height="10" rx="2"/><path stroke-linecap="round" d="M8 10V7a4 4 0 1 1 8 0v3"/></svg>
            Authentication
            <svg class="h-[11px] w-[11px] opacity-50 transition-transform duration-200 group-aria-expanded:rotate-180" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="m6 9 6 6 6-6"/></svg>
          </button>

          <div [class.hidden]="!isAuthOpen" class="absolute left-0 top-[calc(100%+10px)] w-[200px] rounded-[10px] border border-[#262D38] bg-[#171C24] p-1.5 shadow-[0_20px_40px_-12px_rgba(0,0,0,0.6)]" id="authDropdown">
            <a routerLink="/auth/login" class="flex items-center justify-between rounded-[7px] px-2.5 py-2.25 text-xs text-[#8A92A3] transition-all duration-150 hover:bg-[#20262F] hover:text-[#ECEAE3]">Login <span class="font-mono text-[10.5px] text-[#5A6272]">→</span></a>
            <a routerLink="/auth/register" class="flex items-center justify-between rounded-[7px] px-2.5 py-2.25 text-xs text-[#8A92A3] transition-all duration-150 hover:bg-[#20262F] hover:text-[#ECEAE3]">Register <span class="font-mono text-[10.5px] text-[#5A6272]">→</span></a>
            <a routerLink="/auth/forgot" class="flex items-center justify-between rounded-[7px] px-2.5 py-2.25 text-xs text-[#8A92A3] transition-all duration-150 hover:bg-[#20262F] hover:text-[#ECEAE3]">Forgot password <span class="font-mono text-[10.5px] text-[#5A6272]">→</span></a>
          </div>
        </div>

        <a #dashRef
           routerLink="/dashboard" 
           routerLinkActive="active" 
           (mouseenter)="movePill(dashRef)" 
           class="nav-item group relative z-10 flex cursor-pointer items-center gap-1.75 rounded-[8px] bg-none px-3.5 py-2 text-[13.5px] font-medium text-[#8A92A3] transition-colors duration-200 hover:text-[#ECEAE3] [&.active]:text-[#ECEAE3]">
          <svg class="h-[15px] w-[15px] opacity-75 group-hover:opacity-100 group-[.active]:opacity-100 group-[.active]:stroke-[#FFB454]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M4 19V10m6 9V4m6 15v-7"/></svg>
          Dashboard
        </a>

        <a #settingsRef
           routerLink="/settings" 
           routerLinkActive="active" 
           (mouseenter)="movePill(settingsRef)" 
           class="nav-item group relative z-10 flex cursor-pointer items-center gap-1.75 rounded-[8px] bg-none px-3.5 py-2 text-[13.5px] font-medium text-[#8A92A3] transition-colors duration-200 hover:text-[#ECEAE3] [&.active]:text-[#ECEAE3]">
          <svg class="h-[15px] w-[15px] opacity-75 group-hover:opacity-100 group-[.active]:opacity-100 group-[.active]:stroke-[#FFB454]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>
          Settings
        </a>
      </div>

      <div class="flex items-center gap-2 sm:gap-2.5">
        <div class="hidden cursor-pointer items-center gap-2 rounded-[9px] border border-[#262D38] bg-[#0F1319] py-1.75 pl-2.75 pr-2.5 text-[12.5px] text-[#5A6272] transition-colors duration-200 hover:border-[#3A4250] md:flex">
          <svg class="h-3.5 w-3.5 opacity-70" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path stroke-linecap="round" d="m21 21-4.3-4.3"/></svg>
          Search
          <div class="flex gap-1">
            <span class="rounded-[4px] border border-[#2C3340] bg-[#1C222B] px-1.25 py-0.5 font-mono text-[10px] text-[#5A6272]">⌘</span>
            <span class="rounded-[4px] border border-[#2C3340] bg-[#1C222B] px-1.25 py-0.5 font-mono text-[10px] text-[#5A6272]">K</span>
          </div>
        </div>

        <button class="relative flex h-[34px] w-[34px] items-center justify-center rounded-[9px] border border-transparent bg-transparent text-[#8A92A3] transition-all duration-150 hover:border-[#262D38] hover:bg-[#171C24] hover:text-[#ECEAE3]" aria-label="Notifications">
          <svg class="h-[17px] w-[17px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path stroke-linecap="round" d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="absolute right-[7px] top-[6px] h-1.5 w-1.5 rounded-full border-[1.5px] border-[#0F1319] bg-[#FFB454]"></span>
        </button>

        <div class="flex cursor-pointer items-center gap-2 rounded-[20px] border border-[#262D38] p-1 pr-2.5 transition-all duration-200 hover:border-[#3A4250] hover:bg-[#171C24]">
          <div class="relative h-6 w-6 rounded-full bg-gradient-to-br from-[#3A4250] to-[#20262F] after:absolute after:-bottom-px after:-right-px after:h-2 after:w-2 after:rounded-full after:border-2 after:border-[#0F1319] after:bg-[#5FD97A]"></div>
          <span class="hidden text-[12.5px] font-medium text-[#8A92A3] sm:inline">{{ userName }}</span>
        </div>

        <button (click)="toggleMobileMenu()" class="flex h-[34px] w-[34px] items-center justify-center rounded-[9px] border border-[#262D38] bg-none text-[#8A92A3] md:hidden" aria-label="Open menu">
          <svg class="h-[17px] w-[17px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg>
        </button>
      </div>

    </div>
  </div>

  <div [class.hidden]="!isMobileMenuOpen" class="border-t border-[#262D38] bg-[#0F1319] px-4 pb-4 pt-2.5 md:hidden" id="mobilePanel">
    <a routerLink="/home" routerLinkActive="text-[#FFB454]! active" class="flex items-center gap-2.5 border-b border-[#1B212B] py-2.75 px-2 text-sm text-[#8A92A3]">🏠 Home</a>
    <div class="font-mono text-[10px] tracking-[0.08em] text-[#5A6272] pt-3.5 px-2 pb-1.5">AUTHENTICATION</div>
    <a routerLink="/auth/login" class="flex items-center gap-2.5 border-b border-[#1B212B] py-2.75 px-2 text-sm text-[#8A92A3]">Login</a>
    <a routerLink="/auth/register" class="flex items-center gap-2.5 border-b border-[#1B212B] py-2.75 px-2 text-sm text-[#8A92A3]">Register</a>
    <a routerLink="/auth/forgot" class="flex items-center gap-2.5 border-b border-[#1B212B] py-2.75 px-2 text-sm text-[#8A92A3]">Forgot password</a>
    <a routerLink="/dashboard" routerLinkActive="text-[#FFB454]! active" class="flex items-center gap-2.5 border-b border-[#1B212B] py-2.75 px-2 text-sm text-[#8A92A3]">📊 Dashboard</a>
    <a routerLink="/settings" routerLinkActive="text-[#FFB454]! active" class="flex items-center gap-2.5 border-b border-[#1B212B] py-2.75 px-2 text-sm text-[#8A92A3]">⚙️ Settings</a>
  </div>
</nav>
